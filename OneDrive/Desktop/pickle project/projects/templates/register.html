{% extends "base.html" %}
{% block title %}Register – Pickles & Snacks{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">🥒</div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join the Pickles & Snacks family today</p>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Priya Sharma" required/>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account →</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
